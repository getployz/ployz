[package]
name = "ployz"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
tokio-util = "0.7"
derive_more = { version = "1", features = ["display"] }
rand = "0.8"
clap = { version = "4", features = ["derive"] }
tracing-subscriber = "0.3"
hostname = "0.4.2"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
