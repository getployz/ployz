[package]
name = "ployz"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
tokio-util = "0.7"
derive_more = { version = "2.1.1", features = ["display"] }
rand = "0.10.0"
clap = { version = "4", features = ["derive"] }
tracing-subscriber = "0.3"
hostname = "0.4.2"
directories = "6.0.0"
figment = { version = "0.10", features = ["env", "toml"] }
toml = "0.8"

base64 = "0.22"
ed25519-dalek = "2"
corro-client = { git = "https://github.com/getployz/corrosion.git", branch = "main" }
corro-api-types = { git = "https://github.com/getployz/corrosion.git", branch = "main" }
futures-util = "0.3"
bollard = "0.20.1"
defguard_wireguard_rs = "0.9.3"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
ipnet = { version = "2.12.0", features = ["serde"] }
x25519-dalek = { version = "2.0.1", features = ["static_secrets"] }
smoltcp = { version = "0.12.0", default-features = false, features = ["std", "medium-ip", "proto-ipv6", "socket-tcp"] }
defguard_boringtun = "0.6"
if-addrs = "0.13"
rusqlite = "0.38"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
