name: Build eBPF sidecar image

on:
  push:
    branches: [main]
    paths:
      - "ebpf/**"
      - "ebpf-common/**"
      - "ebpf-ctl/**"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/getployz/ployz-ebpf

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ebpf-ctl/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max