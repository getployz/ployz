name: Build dataplane sidecar image

on:
  push:
    branches: [main]
    paths:
      - "crates/ebpf/**"
      - "crates/ebpf-common/**"
      - "crates/ployz-bpfctl/**"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/getployz/ployz-bpfctl

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: blacksmith-4vcpu-ubuntu-2204
            platform: linux/amd64
            suffix: amd64
          - runner: blacksmith-4vcpu-ubuntu-2204-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: Dockerfile.bpfctl
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}-${{ matrix.suffix }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE }}:latest \
            ${{ env.IMAGE }}:${{ github.sha }}-amd64 \
            ${{ env.IMAGE }}:${{ github.sha }}-arm64

          docker buildx imagetools create -t ${{ env.IMAGE }}:${{ github.sha }} \
            ${{ env.IMAGE }}:${{ github.sha }}-amd64 \
            ${{ env.IMAGE }}:${{ github.sha }}-arm64