name: Reusable image build

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      cache_scope:
        required: true
        type: string
      tag:
        required: true
        type: string
      publish_latest:
        required: true
        type: boolean

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: blacksmith-4vcpu-ubuntu-2204
            platform: linux/amd64
            suffix: amd64
          - runner: blacksmith-4vcpu-ubuntu-2204-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ inputs.cache_scope }}-${{ matrix.suffix }}
          cache-to: type=gha,scope=${{ inputs.cache_scope }}-${{ matrix.suffix }},mode=max
          push: true
          tags: ${{ inputs.image }}:${{ inputs.tag }}-${{ matrix.suffix }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        run: |
          tags=(-t "${{ inputs.image }}:${{ inputs.tag }}")
          if [[ "${{ inputs.publish_latest }}" == "true" ]]; then
            tags+=(-t "${{ inputs.image }}:latest")
          fi

          docker buildx imagetools create \
            "${tags[@]}" \
            ${{ inputs.image }}:${{ inputs.tag }}-amd64 \
            ${{ inputs.image }}:${{ inputs.tag }}-arm64
